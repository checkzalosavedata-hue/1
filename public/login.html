<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Nhập - HanziPro</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .login-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .login-card {
            width: 100%;
            max-width: 400px;
            padding: 40px;
            text-align: center;
        }
        .login-logo { font-size: 3rem; color: var(--primary); margin-bottom: 20px; }
        .tab-switch { display: flex; margin-bottom: 30px; background: rgba(0,0,0,0.05); border-radius: 12px; padding: 5px; }
        .tab-btn { flex: 1; padding: 10px; border: none; background: none; cursor: pointer; border-radius: 8px; font-weight: 600; color: var(--text-light); transition: 0.3s; }
        .tab-btn.active { background: white; color: var(--primary); box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        body.dark-mode .tab-btn.active { background: var(--bg-color); }
        .form-section { display: none; }
        .form-section.active { display: block; animation: fadeIn 0.4s ease; }
    </style>
</head>
<body class="light-mode">
    <div class="bg-animated">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <div class="login-wrapper">
        <div class="login-card glass-panel">
            <div class="login-logo"><i class="fas fa-yin-yang"></i></div>
            <h1 style="margin-bottom: 10px;">Chào mừng quay lại</h1>
            <p style="color: var(--text-light); margin-bottom: 30px;">Học tiếng Trung mỗi ngày cùng HanziPro</p>

            <div class="tab-switch">
                <button class="tab-btn active" onclick="switchTab('login')">Đăng Nhập</button>
                <button class="tab-btn" onclick="switchTab('register')">Đăng Ký</button>
            </div>

            <!-- Login Form -->
            <section id="section-login" class="form-section active">
                <form id="loginForm">
                    <div class="input-group">
                        <label>Tên đăng nhập</label>
                        <input type="text" id="loginUser" required autocomplete="username">
                    </div>
                    <div class="input-group">
                        <label>Mật khẩu</label>
                        <input type="password" id="loginPass" required autocomplete="current-password">
                    </div>
                    <button type="submit" class="btn-primary full-width">Vào Học Ngay</button>
                </form>
            </section>

            <!-- Register Form -->
            <section id="section-register" class="form-section">
                <form id="registerForm">
                    <div class="input-group">
                        <label>Tên người dùng mới</label>
                        <input type="text" id="regUser" required autocomplete="username">
                    </div>
                    <div class="input-group">
                        <label>Mật khẩu</label>
                        <input type="password" id="regPass" required autocomplete="new-password">
                    </div>
                    <button type="submit" class="btn-primary full-width">Tạo Tài Khoản</button>
                </form>
            </section>
        </div>
    </div>

    <div id="toastContainer" class="toast-container"></div>

    <script>
        function switchTab(type) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.form-section').forEach(s => s.classList.remove('active'));
            
            if(type === 'login') {
                document.querySelector('.tab-btn:nth-child(1)').classList.add('active');
                document.getElementById('section-login').classList.add('active');
            } else {
                document.querySelector('.tab-btn:nth-child(2)').classList.add('active');
                document.getElementById('section-register').classList.add('active');
            }
        }

        // Logic Auth
        async function handleAuth(e, type) {
            e.preventDefault();
            const user = document.getElementById(type === 'login' ? 'loginUser' : 'regUser').value;
            const pass = document.getElementById(type === 'login' ? 'loginPass' : 'regPass').value;

            try {
                const res = await fetch(`/api/auth/${type}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: user, password: pass })
                });
                const data = await res.json();
                if(data.success) {
                    if(type === 'login') {
                        window.location.reload(); // Reload to index.html
                    } else {
                        showToast("Đăng ký thành công! Hãy đăng nhập.", "success");
                        switchTab('login');
                    }
                } else {
                    showToast(data.error, "error");
                }
            } catch(e) { showToast("Lỗi kết nối server", "error"); }
        }

        document.getElementById('loginForm').addEventListener('submit', (e) => handleAuth(e, 'login'));
        document.getElementById('registerForm').addEventListener('submit', (e) => handleAuth(e, 'register'));

        function showToast(message, type = 'success') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.innerHTML = `<i class="fas fa-${type === 'success' ? 'check-circle' : 'exclamation-circle'}"></i> ${message}`;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
    </script>
</body>
</html>
